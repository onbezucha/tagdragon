<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="fireGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#E8710A"/>
    </radialGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15" fill="#E8710A"/>
  
  <!-- Eye white -->
  <circle cx="16" cy="16" r="12" fill="#FEF3C7"/>
  
  <!-- Iris -->
  <circle cx="16" cy="16" r="8" fill="url(#fireGradient)"/>
  
  <!-- Pupil -->
  <ellipse cx="16" cy="16" rx="3" ry="3.5" fill="#1F2937"/>
  
  <!-- Highlight -->
  <circle cx="13.5" cy="13.5" r="2" fill="#FFF" opacity="0.95"/>
</svg>
