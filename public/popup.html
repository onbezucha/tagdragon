<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>TagDragon</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <img src="icons/icon48.png" class="brand-icon" alt="">
        <span class="brand-name">TagDragon</span>
      </div>

    </header>

    <!-- DevTools Warning -->
    <div id="devtools-warning" class="warning hidden">
      <span class="warning-icon">⚠️</span>
      <span class="warning-text">Open DevTools to capture requests (F12)</span>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-indicator">
        <span id="status-dot" class="dot recording"></span>
        <span id="status-text">Recording</span>
      </div>
      <button id="btn-pause" class="btn-pause" title="Pause recording">
        <span class="pause-icon">⏸</span>
        <span class="pause-text">Pause</span>
      </button>
    </div>

    <!-- Providers Section -->
    <section class="providers-section">
      <h3 class="section-title">Detected providers</h3>
      <div id="providers-empty" class="empty-state hidden">
        No requests captured
      </div>
      <div id="providers-list" class="providers-list hidden"></div>
      <button id="btn-show-all" class="btn-show-all hidden">
        Show all (<span id="others-count">0</span>)
      </button>
    </section>

    <!-- Summary Section -->
    <section class="summary-section">
      <h3 class="section-title">Summary</h3>
      <div class="summary-grid">
        <div class="summary-item">
          <span class="summary-label">Total requests</span>
          <span id="total-requests" class="summary-value">0</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Data transferred</span>
          <span id="total-size" class="summary-value">0 B</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Avg. response</span>
          <span id="avg-duration" class="summary-value">0 ms</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Success rate</span>
          <span id="success-rate" class="summary-value">100%</span>
        </div>
      </div>
      <div class="last-activity">
        Last activity: <span id="last-activity">-</span>
      </div>
    </section>

    <!-- Actions -->
    <section class="actions-section">
      <button id="btn-clear" class="btn-action btn-danger">
        <span class="btn-icon">🗑️</span>
        <span>Clear all</span>
      </button>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-version">v1.5.1</span>
    </footer>

  </div>

  <script src="../dist/popup.js"></script>
</body>
</html>
